name: iOS → TestFlight

# Manual trigger: Actions tab → "iOS → TestFlight" → Run workflow.
# Requires repository secrets (Settings → Secrets and variables → Actions):
#   APPLE_TEAM_ID   — developer.apple.com → Membership → Team ID
#   ASC_KEY_ID      — App Store Connect → Users and Access → Integrations → key ID
#   ASC_ISSUER_ID   — same page, Issuer ID
#   ASC_KEY_P8      — full contents of the downloaded AuthKey_XXXX.p8 file
# One-time prerequisite: create the app record in App Store Connect with
# bundle ID com.neverpeak.flagexplorer (Apps → + → New App).

on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (App Store requires the iOS 26 SDK as of 2026)
        run: |
          latest=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          [ -z "$latest" ] && latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version
          echo "iOS SDKs:"; xcodebuild -showsdks | grep -i ios || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS deps & stage web app
        run: |
          npm install
          npm run mobile:stage

      - name: Bundle native in-app-purchases (RevenueCat)
        env:
          REVENUECAT_IOS_KEY: ${{ secrets.REVENUECAT_IOS_KEY }}
        run: |
          if [ -z "$REVENUECAT_IOS_KEY" ]; then
            echo "❌ REVENUECAT_IOS_KEY secret is not set — add the RevenueCat Apple public key (appl_…)."
            exit 1
          fi
          npm run mobile:iap
          test -s dist/native-iap.bundle.js && echo "✅ native-iap.bundle.js built"

      - name: Generate native iOS project
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Declare no non-exempt encryption (skip export-compliance prompt)
        run: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

      - name: Generate icons & splash screens
        run: npx @capacitor/assets generate --ios --iconBackgroundColor '#1d4ed8' --splashBackgroundColor '#1d4ed8'

      - name: Sanity-check secrets (lengths only, values never printed)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          ok=1
          for v in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8; do
            val="${!v}"
            if [ -z "$val" ]; then
              echo "❌ $v is EMPTY or not set — check the secret name spelling in repo Settings → Secrets → Actions"
              ok=0
            else
              echo "✅ $v present (length ${#val})"
            fi
          done
          case "$ASC_KEY_P8" in
            *"BEGIN PRIVATE KEY"*) echo "✅ ASC_KEY_P8 contains a PEM private key header";;
            *) echo "ℹ️ ASC_KEY_P8 has no PEM header — fastlane will wrap the base64 body automatically";;
          esac
          [ "$ok" = "1" ] || exit 1

      - name: Build & upload to TestFlight
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: fastlane ios beta

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flag-explorer-ipa
          path: build/*.ipa
          if-no-files-found: ignore
